name: Build

on:
  push:
  pull_request:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.301'

      - name: Build
        run: |
          mkdir -p artifacts/logs
          dotnet build --configuration Release -bl:artifacts/logs/build.binlog

      - name: Install complog
        if: always() && hashFiles('artifacts/logs/build.binlog') != ''
        run: dotnet tool install --tool-path .tools complog

      - name: Create complog
        if: always() && hashFiles('artifacts/logs/build.binlog') != ''
        run: .tools/complog create --out artifacts/logs/build.complog artifacts/logs/build.binlog

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            artifacts/logs/build.binlog
            artifacts/logs/build.complog
          if-no-files-found: error

      - name: Disable workflow after scheduled failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method PUT repos/${{ github.repository }}/actions/workflows/build.yml/disable
