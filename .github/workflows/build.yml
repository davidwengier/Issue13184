name: Build

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      continue_loop:
        description: 'Queue another run after this one succeeds.'
        type: boolean
        required: false
        default: true
      delay_seconds:
        description: 'Seconds to wait before queuing the next run.'
        required: false
        default: '600'

permissions:
  actions: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.301'

      - name: Build
        run: |
          mkdir -p artifacts/logs
          dotnet build --configuration Release -bl:artifacts/logs/build.binlog

      - name: Install complog
        if: always() && hashFiles('artifacts/logs/build.binlog') != ''
        run: dotnet tool install --tool-path .tools complog

      - name: Create complog
        if: always() && hashFiles('artifacts/logs/build.binlog') != ''
        run: .tools/complog create --out artifacts/logs/build.complog artifacts/logs/build.binlog

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            artifacts/logs/build.binlog
            artifacts/logs/build.complog
          if-no-files-found: error

      - name: Queue next build
        if: success() && github.event_name == 'workflow_dispatch' && inputs.continue_loop
        env:
          GH_TOKEN: ${{ github.token }}
          DELAY_SECONDS: ${{ inputs.delay_seconds }}
        run: |
          case "$DELAY_SECONDS" in
            ''|*[!0-9]*)
              echo "::error::delay_seconds must be a non-negative integer."
              exit 1
              ;;
          esac

          sleep "$DELAY_SECONDS"
          gh workflow run build.yml --ref main -f continue_loop=true -f delay_seconds=600
